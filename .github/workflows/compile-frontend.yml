name: Faso-Educ Automated Frontend & Android Compiler

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggers from the GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle' # Speeds up builds by caching gradle downloads

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Compile and Build Web Application
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://faso-educ-backend.onrender.com

      - name: Ensure Capacitor Configurations & Sync (On-The-Fly Restoration)
        run: |
          # Check if capacitor.config.json exists, if not recreate a default one
          if [ ! -f "capacitor.config.json" ]; then
            echo '{"appId":"com.fasoeduc.app","appName":"Faso Educ","webDir":"dist","server":{"androidScheme":"https"}}' > capacitor.config.json
            echo "⚠️ Re-created missing capacitor.config.json"
          fi

          # Install capacitor packages if they are somehow missing
          npm install @capacitor/core @capacitor/cli @capacitor/android --no-audit --no-fund

          # Check if the android platform folder is missing and restore it dynamically
          if [ ! -d "android" ]; then
            echo "⚠️ Android native directory not found in repository. Restoring on-the-fly..."
            npx cap add android
          else
            echo "✅ Android native directory found. Proceeding with sync..."
          fi

          # Sync the compiled web application (dist/) with the native Android wrapper
          npx cap sync android

      - name: Auto-Accept Android SDK Licenses
        run: |
          echo "y" | sdkmanager --licenses || true

      - name: Repair and Force-Rebuild Gradle Wrapper Binary
        run: |
          echo "🔧 Commencing professional Gradle Wrapper verification and repair..."
          cd android
          
          # 1. Clean up any corrupted wrapper jar
          rm -f gradle/wrapper/gradle-wrapper.jar
          mkdir -p gradle/wrapper
          
          # 2. Force download of a pristine, official, verified gradle-wrapper.jar binary (v8.14.3)
          echo "📥 Downloading official uncorrupted gradle-wrapper.jar binary..."
          curl -sL --retry 5 --retry-connrefused "https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          
          # 3. Double-check jar validity, if still corrupt or curl failed, fall back to downloading via gradle services wrapper directly
          if [ ! -s gradle/wrapper/gradle-wrapper.jar ] || ! jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "⚠️ First download attempt invalid or unsuccessful. Downloading via official services.gradle.org distribution..."
            curl -sL --retry 5 --retry-connrefused "https://services.gradle.org/distributions/gradle-8.14.3-bin.zip" -o gradle-temp.zip
            unzip -q -o gradle-temp.zip "gradle-8.14.3/lib/plugins/gradle-wrapper-*" -d .
            cp gradle-8.14.3/lib/plugins/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar || true
            rm -rf gradle-temp.zip gradle-8.14.3
          fi
          
          # 4. Final verification of the jar binary integrity
          if [ -s gradle/wrapper/gradle-wrapper.jar ]; then
            echo "✅ Pristine gradle-wrapper.jar binary successfully placed and verified!"
          else
            echo "⚠️ Warning: Automated repair jar checks failed. Falling back to runner-native gradle wrapper generator..."
            gradle wrapper --gradle-version 8.14.3
          fi

      - name: Ensure Executable Gradle Wrapper
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
            echo "✅ Gradle wrapper permissions set."
          else
            echo "❌ Error: android/gradlew not found!"
            exit 1
          fi

      - name: Build Android APK (Installable Debug APK)
        run: |
          cd android
          # Run the build using Gradle with build-cache enabled for extreme reliability
          ./gradlew assembleDebug --no-daemon --build-cache

      - name: Locate and Secure Built APK
        run: |
          mkdir -p build-artifacts
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" build-artifacts/faso-educ-debug.apk
            echo "✅ Android APK successfully compiled and prepared in build-artifacts/ !"
          else
            echo "❌ CRITICAL ERROR: Compilation succeeded but APK binary was not found at expected path: $APK_PATH"
            exit 1
          fi

      - name: Upload Highly Optimized Android APK
        uses: actions/upload-artifact@v4
        with:
          name: faso-educ-android-apk
          path: build-artifacts/faso-educ-debug.apk
          retention-days: 30
          if-no-files-found: error
