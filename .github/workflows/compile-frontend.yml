name: Faso-Educ Automated Frontend & Android Compiler

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggers from the GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Compile and Build Web Application
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://faso-educ-backend.onrender.com

      - name: Sync Web Application with Capacitor Android
        run: npx cap sync android

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Build Android APK (Installable Debug APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Locate and Prepare APK
        run: |
          mkdir -p build-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk build-artifacts/faso-educ-debug.apk
          echo "APK successfully compiled and copied to build-artifacts/"

      - name: Upload Installable Android APK
        uses: actions/upload-artifact@v4
        with:
          name: faso-educ-android-apk
          path: build-artifacts/faso-educ-debug.apk
          retention-days: 30
          if-no-files-found: error
